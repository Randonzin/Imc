<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de IMC</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
      text-align: center;
    }
       h1 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    .resultado {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Calculadora IMC</h1>

  <input type="number" id="peso" placeholder="Digite seu peso (kg)">
  <input type="number" id="altura" placeholder="Digite sua altura (m)">

  <button onclick="calcularIMC()">Calcular</button>

  <div class="resultado" id="resultado"></div>
</div>

<script>
  function calcularIMC() {
    let peso = parseFloat(document.getElementById("peso").value);
    let altura = parseFloat(document.getElementById("altura").value);

    if (!peso || !altura) {
      document.getElementById("resultado").innerText = "Preencha todos os campos!";
      return;
    }
        let imc = peso / (altura * altura);
    let mensagem = "";

    if (imc <= 18.4) {
      mensagem = "Peso abaixo do recomendado";
    } 
    else if (imc >= 18.5 && imc <= 24.9) {
      mensagem = "Peso ideal";
    } 
    else if (imc >= 25.0 && imc <= 29.9) {
      mensagem = "Acima do peso";
    } 
    else if (imc >= 30.0 && imc <= 34.9) {
      mensagem = "Obesidade classe 1";
    } 
    else if (imc >= 35.0 && imc <= 39.9) {
      mensagem = "Obesidade classe 2";
    } 
    else {
      mensagem = "Obesidade classe 3";
    }

    document.getElementById("resultado").innerText =
      "Seu IMC é " + imc.toFixed(2) + " - " + mensagem;
  }
</script>

</body>
</html>
